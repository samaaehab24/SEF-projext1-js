<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogIn & signUp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="container-header">
            <div class="header-content">
                <img src="images/logo.png" class="brand">
                <nav>
                    <ul id="links">
                        <li><a href="login.html" class="sign">Sign In</a></li>
                        <li><a href="signup.html" class="sign">Sign Up</a></li>
                    </ul>
                    <ul id="user_info">
                        <li><a href="#" id="user"></a></li>
                        <li class="shopping-card">
                            <i class="fa-solid fa-cart-shopping"></i>
                            <span class="badge"></span>
                            <div class="card-products">
                                <div></div>
                                <a href="cardproducts.html">View all products</a>
                            </div>
                        </li>
                        <li><a href="#" id="logout" class="sign">Log Out</a></li>
                    </ul>
                </nav>
            </div>
        </div>
    </header>
    <section class="home">
                <div class="container-fluid px-5">
                    <div class="search-box mb-4 d-flex justify-content-center">
                        <input type="text" id="searchInput" placeholder="Search for plant..." class="form-control w-50">
                        <button class="btn search-btn">search</button>
                        
                    </div>
                    <div class="price-slider mb-4 d-flex flex-column align-items-center">
                        <label for="priceRange">Filter by price: <span id="priceValue">$0 - $100</span></label>
                        <input type="range" id="priceRange" min="0" max="100" value="100" class="form-range w-50">
                    </div>
            <div class="products">
                </div>
                

    </section>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
