<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="container-header">
            <div class="header-content">
                <img src="images/logo.png" class="brand">
                <nav>
                    <ul>
                        <li><a href="login.html" class="sign">Sign In</a></li>
                        <li><a href="signup.html" class="sign">Sign Up</a></li>
                    </ul>
                    <ul id="user_info">
                        <li><a href="#" id="user"></a></li>
                    </ul>
                </nav>
            </div>
        </div>
    </header>
    <div class="container container-sign bg-light shadow rounded-4 p-4 text-center">
    
        <div class="form-box signin">
            <form class="form-signin">
                <h1 class="mb-4">Sign In</h1>
                <div class="social-media">
                    <a href="#"><i class="fa-brands fa-google-plus-g"></i></a>
                    <a href="#"><i class="fa-brands fa-facebook-f"></i></a>
                    <a href="#"><i class="fa-brands fa-github"></i></a>
                    <a href="#"><i class="fa-brands fa-linkedin-in"></i></a>
                </div><!--/social-media-->
                <p class="mt-4">or use your email password</p>
                <div class="mb-3 mt-3">
                    <input type="text" class="form-control" placeholder="Username" name="username" id="username">
                </div>
                <div class="mb-3">
                    <input type="password" class="form-control" placeholder="Password" name="pswd" id="pswd">
                </div>
                <div class="mt-4"><a href="#" class="forget-txt text-decoration-none text-secondary">Forget Your
                        Password?</a></div>
                <button type="submit" class="btn btn-primary mt-4" value="Sign In" id="sign_in">SIGN IN</button>
            </form><!--/form-signin-->
        </div><!--/signin-->
        <div class="toggle-container">
            <div class="toggle-panel toggle-right">
                <!-- <h1>Hello, Friend!</h1> -->
                <h3 class="mx-4">Be a member</h3>
                <button type="submit" class="btn btn-primary"><a href="signup.html">SIGN UP</a></button>
            </div><!--/toggle-left-->
        </div><!--/toggle-container-->
    </div><!--/container-->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
